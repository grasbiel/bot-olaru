<div class="login-container">
  <div class="login-card">
    <header class="brand-header">
      <div class="logo">OLARU</div>
      <p>A inteligência que move sua obra.</p>
    </header>

    <div class="error-message" *ngIf="errorMsg">
      {{ errorMsg }}
    </div>

    <form (submit)="login()" class="login-form">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="email" 
          name="email" 
          required 
          autocomplete="email"
          placeholder="seu@email.com"
          [disabled]="loading"
        >
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="senha" 
          name="senha" 
          required 
          autocomplete="current-password"
          placeholder="••••••••"
          [disabled]="loading"
        >
      </div>

      <button type="submit" class="btn-primary btn-login" [disabled]="loading">
        {{ loading ? 'Autenticando...' : 'Entrar no Sistema' }}
      </button>
    </form>

    <footer class="login-footer">
      &copy; 2026 Olaru Construtech. Todos os direitos reservados.
    </footer>
  </div>
</div>
