<div class="dashboard-layout">
  <app-sidebar></app-sidebar>
  
  <div class="main-content">
    <app-header></app-header>
    
    <main class="content-body">
      <header class="content-header">
        <div class="header-info">
          <h1>Kanban de Visitas Técnicas</h1>
          <p>Acompanhe e gerencie os agendamentos realizados pela IA.</p>
        </div>
        <div class="header-filters">
          <label for="date-filter">Data das Visitas:</label>
          <input type="date" id="date-filter" [(ngModel)]="dataFiltro" (change)="carregarVisitas()" class="date-input">
        </div>
      </header>

      <div class="kanban-board">
        <div class="kanban-column" *ngFor="let col of colunas">
          <div class="column-header">
            <h3>{{ col.title }}</h3>
            <span class="count">{{ col.cards.length }}</span>
          </div>
          <div class="kanban-cards">
            <div class="kanban-card" *ngFor="let card of col.cards" [ngClass]="'border-' + card.status">
              <div class="card-tag" [ngClass]="card.turno">{{ card.turno | uppercase }}</div>
              <h4>{{ card.cliente.nome }}</h4>
              <p>{{ card.descricaoServico }}</p>
              <div class="card-footer">
                <span class="date">📅 {{ card.dataVisita | date:'dd/MM' }}</span>
                <div class="actions">
                   <button *ngIf="card.status === 'pendente'" (click)="mudarStatus(card.id, 'confirmada')" title="Confirmar">✔️</button>
                   <button *ngIf="card.status === 'confirmada'" (click)="mudarStatus(card.id, 'em_andamento')" title="Iniciar">🚀</button>
                   <button *ngIf="card.status === 'em_andamento'" (click)="mudarStatus(card.id, 'concluida')" title="Concluir">✅</button>
                </div>
              </div>
            </div>
            <div *ngIf="col.cards.length === 0" class="empty-col">Sem visitas.</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
