<div class="dashboard-layout">
  <app-sidebar></app-sidebar>
  
  <div class="main-content">
    <app-header></app-header>
    
    <main class="content-body">
      <header class="content-header">
        <div class="header-info">
          <h1>Kanban de Visitas Técnicas</h1>
          <p>Gestão e acompanhamento dos agendamentos em tempo real.</p>
        </div>
        <div class="header-filters">
          <label for="date-filter">Data:</label>
          <input type="date" id="date-filter" [(ngModel)]="dataFiltro" (change)="carregarVisitas()" class="date-input">
        </div>
      </header>

      <div class="kanban-board">
        <div class="kanban-column" *ngFor="let col of colunas">
          <div class="column-header">
            <h3>{{ col.title }}</h3>
            <span class="count">{{ col.cards.length }}</span>
          </div>
          
          <div class="kanban-cards">
            <div class="kanban-card" 
                 *ngFor="let card of col.cards" 
                 [ngClass]="'status-' + card.status">
              
              <div class="card-tag" [ngClass]="card.turno">{{ card.turno }}</div>
              
              <h4>{{ card.cliente.nome }}</h4>
              <p>📍 {{ card.endereco || 'Endereço não informado' }}</p>

              <div class="card-assignment">
                <label>Técnico Responsável:</label>
                <select (change)="atribuirTecnico(card.id, $event)" [value]="card.tecnico?.id || ''">
                  <option value="">Não atribuído</option>
                  <option *ngFor="let t of tecnicos" [value]="t.id">{{ t.nome }}</option>
                </select>
              </div>
              
              <div class="card-footer">
                <span class="date">📅 {{ card.dataVisita | date:'dd/MM' }}</span>
                <div class="actions">
                   <!-- Pendente -> Confirmada / Cancelada -->
                   <ng-container *ngIf="card.status === 'pendente'">
                     <button (click)="mudarStatus(card.id, 'confirmada')" title="Confirmar">✔️</button>
                     <button (click)="mudarStatus(card.id, 'cancelada')" title="Cancelar">❌</button>
                   </ng-container>

                   <!-- Confirmada -> Em Andamento / Cancelada -->
                   <ng-container *ngIf="card.status === 'confirmada'">
                     <button (click)="mudarStatus(card.id, 'em_andamento')" title="Iniciar">🚀</button>
                     <button (click)="mudarStatus(card.id, 'cancelada')" title="Cancelar">❌</button>
                   </ng-container>

                   <!-- Em Andamento -> Concluída / Cancelada -->
                   <ng-container *ngIf="card.status === 'em_andamento'">
                     <button (click)="mudarStatus(card.id, 'concluida')" title="Concluir">✅</button>
                     <button (click)="mudarStatus(card.id, 'cancelada')" title="Cancelar">❌</button>
                   </ng-container>
                </div>
              </div>
            </div>
            
            <div *ngIf="col.cards.length === 0" class="empty-col">Nenhuma visita nesta fase.</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
