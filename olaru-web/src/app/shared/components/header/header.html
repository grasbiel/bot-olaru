<header class="header">
  <div class="search-bar">
    <span class="icon">🔍</span>
    <input type="text" placeholder="Buscar clientes, máquinas ou visitas...">
  </div>
  
  <div class="user-profile">
    <div class="notifications">
      <span class="icon">🔔</span>
    </div>
    
    <div class="user-info" *ngIf="usuario()">
      <div class="avatar">{{ iniciais() }}</div>
      <div class="details">
        <span class="name">{{ usuario()!.nome }}</span>
        <span class="role">{{ perfilLabel() }}</span>
      </div>
    </div>
  </div>
</header>
