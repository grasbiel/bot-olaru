spring:
  application:
    name: olaru-api
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db_construtora}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:72d889c22343e475218d}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate # Agora controlado pelo Flyway
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /

# JWT Configuration
api:
  security:
    token:
      secret: ${JWT_SECRET:olaru-secret-key-para-desenvolvimento-pelo-menos-32-chars}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
