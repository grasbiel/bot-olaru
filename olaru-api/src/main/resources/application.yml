spring:
  application:
    name: olaru-api
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db_construtora}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:72d889c22343e475218d}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate # Agora controlado pelo Flyway
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /

# JWT Configuration
api:
  security:
    token:
      secret: ${JWT_SECRET:olaru-secret-key-para-desenvolvimento-pelo-menos-32-chars}

app:
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    base-url: ${API_BASE_URL:http://localhost:8080}

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Rate Limiting (Bucket4j) - Conforme §6.3
bucket4j:
  enabled: true
  filters:
    - cache-name: buckets
      filter-method: servlet
      url: /api/v1/auth/login
      rate-limits:
        - bandwidths:
            - capacity: 5
              time: 1
              unit: minutes
              fixed-delay: 0
    - cache-name: buckets-read
      filter-method: servlet
      url: /api/v1/(?!auth/login).*
      http-response-body: '{"status": 429, "error": "Too Many Requests", "message": "Limite de requisições excedido. Tente novamente em 1 minuto."}'
      rate-limits:
        - bandwidths:
            - capacity: 120
              time: 1
              unit: minutes

