version: '3.8'

services:
  # 1. Banco de Dados PostgreSQL com suporte a Vetores
  db:
    image: pgvector/pgvector:pg17
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME:-db_construtora}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-db_construtora}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Cache e Controle Anti-Ban (Redis)
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

  # 3. Backend Java (Spring Boot 3.4)
  api:
    build:
      context: ./olaru-api
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-db_construtora}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS}
      - JWT_SECRET=${JWT_SECRET}
      - BOT_API_KEY=${BOT_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  # 4. Middleware/Bot Python (FastAPI)
  app:
    build:
      context: ./olaru-bot
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=5432  
      - DB_NAME=${DB_NAME:-db_construtora}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS}
      - BOT_API_KEY=${BOT_API_KEY}
      - REDIS_HOST=redis
      - JAVA_API_URL=http://api:8080/api/v1
    # Executa o seed (se necessário) e inicia o app
    command: sh -c "python scripts/seed_db.py && uvicorn src.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started

  # 5. Frontend Angular (Nginx)
  web:
    build:
      context: ./olaru-web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
