version: '3.8'

services:
  # Aplicação Python (FastAPI)
  app:
    build: .
    container_name: olaru_bot_app
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis

  # Banco de Dados PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: olaru_bot_db
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME:-db_construtora}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASS:-72d889c22343e475218d}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Cache e Controle Anti-Ban (Redis)
  redis:
    image: redis:7-alpine
    container_name: olaru_bot_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  redis_data:
