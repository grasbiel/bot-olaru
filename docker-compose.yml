version: '3.8'

services:
  # 1. Banco de Dados PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: olaru_bot_db
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME:-db_construtora}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASS:-72d889c22343e475218d}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 2. Cache e Controle Anti-Ban (Redis)
  redis:
    image: redis:7-alpine
    container_name: olaru_bot_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # 3. Backend Java (Spring Boot 3.4)
  api:
    build:
      context: ./olaru-api
    container_name: olaru_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-db_construtora}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS:-72d889c22343e475218d}
      - JWT_SECRET=${JWT_SECRET:-olaru-secret-key-para-desenvolvimento-pelo-menos-32-chars}
    depends_on:
      - db

  # 4. Middleware/Bot Python (FastAPI)
  app:
    build:
      context: .
    container_name: olaru_bot_app
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - JAVA_API_URL=http://api:8080/api/v1
    depends_on:
      - db
      - redis
      - api

  # 5. Frontend Angular (Nginx)
  web:
    build:
      context: ./olaru-web
    container_name: olaru_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
