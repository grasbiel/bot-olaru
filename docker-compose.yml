version: '3.8'

services:
  # 1. Banco de Dados PostgreSQL
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME:-db_construtora}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASS:-72d889c22343e475218d}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-db_construtora}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Cache e Controle Anti-Ban (Redis)
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

  # 3. Backend Java (Spring Boot 3.4)
  api:
    build:
      context: ./olaru-api
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-db_construtora}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS:-72d889c22343e475218d}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  # 4. Middleware/Bot Python (FastAPI)
  app:
    build:
      context: .
    restart: always
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-db_construtora}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS}
      - REDIS_HOST=redis
      - JAVA_API_URL=http://api:8080/api/v1
    # Este comando tenta popular o banco antes de iniciar o bot
    command: sh -c "python seed_db.py && python main.py"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started

  # 5. Frontend Angular (Nginx)
  web:
    build:
      context: ./olaru-web
    restart: always
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
